<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ph.D. Attendance Portal — DSE</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;padding:2rem 1rem;}
  .container{max-width:720px;margin:0 auto;}
  h2{font-size:20px;font-weight:500;margin-bottom:4px;}
  .top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem;}
  .mark-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;background:#185fa5;color:#fff;font-size:14px;font-weight:500;border:none;border-radius:8px;cursor:pointer;text-decoration:none;white-space:nowrap;}
  .mark-btn:hover{opacity:0.9;}
  .subtitle{font-size:13px;color:#666;}
  .divider{border:none;border-top:1px solid #e8e8e4;margin-bottom:1.5rem;}
  .section-label{font-size:12px;color:#888;margin-bottom:0.75rem;}
  .search-box{display:flex;gap:8px;margin-bottom:1.5rem;}
  .search-wrap{position:relative;flex:1;}
  input[type=text]{width:100%;padding:8px 12px;font-size:15px;border:1px solid #ccc;border-radius:8px;outline:none;background:#fff;}
  input[type=text]:focus{border-color:#888;}
  button{padding:8px 18px;font-size:14px;border:1px solid #aaa;border-radius:8px;background:#fff;cursor:pointer;}
  button:hover{background:#f0f0ee;}
  .suggest-list{position:absolute;background:#fff;border:1px solid #ccc;border-radius:8px;width:100%;max-height:200px;overflow-y:auto;z-index:10;top:calc(100% + 4px);}
  .suggest-item{padding:8px 12px;font-size:14px;cursor:pointer;}
  .suggest-item:hover{background:#f5f5f3;}
  .result-card{background:#fff;border:1px solid #e0e0dc;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
  .student-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
  .avatar{width:44px;height:44px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;color:#185fa5;flex-shrink:0;}
  .course-tag{display:inline-block;font-size:11px;padding:2px 8px;background:#f0f0ee;border-radius:10px;color:#666;margin-bottom:4px;}
  .student-name{font-size:16px;font-weight:500;}
  .student-meta{font-size:13px;color:#666;}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
  .stat-card{background:#f5f5f3;border-radius:8px;padding:0.75rem;text-align:center;}
  .stat-label{font-size:12px;color:#888;margin-bottom:4px;}
  .stat-val{font-size:20px;font-weight:500;}
  .pct-bar-wrap{height:6px;background:#e8e8e4;border-radius:3px;margin-top:6px;overflow:hidden;}
  .pct-bar{height:100%;border-radius:3px;}
  .req-row{display:flex;justify-content:space-between;font-size:11px;color:#888;margin:4px 0 12px;}
  .dates-section{border-top:1px solid #e8e8e4;padding-top:0.75rem;}
  .dates-label{font-size:12px;color:#888;margin-bottom:8px;}
  .dates-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .date-chip{font-size:12px;padding:4px 10px;border-radius:20px;}
  .present{background:#eaf3de;color:#3b6d11;}
  .absent{background:#fcebeb;color:#a32d2d;}
  .no-result{text-align:center;color:#888;padding:2rem;font-size:14px;}
  .updated{font-size:11px;color:#aaa;text-align:right;margin-top:2rem;}
</style>
</head>

function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function pctColor(p){return p>=75?'#3B6D11':p>=50?'#BA7517':'#A32D2D';}
function calcAtt(s){const dates=Object.keys(s.sessions);const present=dates.filter(d=>s.sessions[d]).length;return{present,total:dates.length};}
function renderCard(s){
  const{present,total}=calcAtt(s);const absent=total-present;
  const pct=total>0?Math.round(present/total*100):0;const col=pctColor(pct);
  const chips=Object.keys(s.sessions).map(d=>{const ok=s.sessions[d];return'<span class="date-chip '+(ok?'present':'absent')+'">'+d+' '+(ok?'✓':'✗')+'</span>';}).join('');
  return'<div class="result-card">'+
    '<div class="student-header"><div class="avatar">'+initials(s.name)+'</div>'+
    '<div><span class="course-tag">'+s.course+'</span>'+
    '<div class="student-name">'+s.name+'</div>'+
    '<div class="student-meta">Roll no. '+s.sno+'</div></div></div>'+
    '<div class="stats-grid">'+
    '<div class="stat-card"><div class="stat-label">Days attended</div><div class="stat-val" style="color:'+col+'">'+present+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Days absent</div><div class="stat-val">'+absent+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Attendance %</div><div class="stat-val" style="color:'+col+'">'+pct+'%</div></div>'+
    '</div>'+
    '<div class="pct-bar-wrap"><div class="pct-bar" style="width:'+pct+'%;background:'+col+';"></div></div>'+
    '<div class="req-row"><span>'+(pct>=75?'✓ Attendance requirement met':'⚠ Below 75% requirement')+'</span><span>'+present+' of '+total+' class days</span></div>'+
    '<div class="dates-section"><div class="dates-label">Day-by-day record (oldest first)</div>'+
    '<div class="dates-grid">'+chips+'</div></div></div>';
}
function doSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('suggestList').style.display='none';
  if(!q){document.getElementById('resultArea').innerHTML='';return;}
  const matches=STUDENTS.filter(s=>s.name.toLowerCase().includes(q));
  document.getElementById('resultArea').innerHTML=matches.length?matches.map(renderCard).join(''):'<div class="no-result">No student found. Try a partial name.</div>';
}
function onInput(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const list=document.getElementById('suggestList');
  if(!q){list.style.display='none';return;}
  const m=STUDENTS.filter(s=>s.name.toLowerCase().includes(q)).slice(0,8);
  if(!m.length){list.style.display='none';return;}
  list.innerHTML=m.map(s=>'<div class="suggest-item" onclick="sel(''+s.name+'')">'+s.name+' <span style="color:#aaa;font-size:12px;">· '+s.course+'</span></div>').join('');
  list.style.display='block';
}
function sel(name){document.getElementById('searchInput').value=name;document.getElementById('suggestList').style.display='none';doSearch();}
function onKey(e){if(e.key==='Enter')doSearch();if(e.key==='Escape')document.getElementById('suggestList').style.display='none';}
document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap'))document.getElementById('suggestList').style.display='none';});
</script>
