  .pct-bar{height:100%;border-radius:3px;}
  .req-row{display:flex;justify-content:space-between;font-size:11px;color:#888;margin:4px 0 12px;}
  .dates-section{border-top:1px solid #e8e8e4;padding-top:0.75rem;}
  .dates-label{font-size:12px;color:#888;margin-bottom:8px;}
  .dates-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .date-chip{font-size:12px;padding:4px 10px;border-radius:20px;}
  .present{background:#eaf3de;color:#3b6d11;}
  .absent{background:#fcebeb;color:#a32d2d;}
  .no-result{text-align:center;color:#888;padding:2rem;font-size:14px;}

function initials(n){return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function pctColor(p){return p>=75?'#3B6D11':p>=50?'#BA7517':'#A32D2D';}

function calcAtt(s){
  const dates=Object.keys(s.sessions);
  const present=dates.filter(d=>s.sessions[d]).length;
  return{present,total:dates.length};
}

function renderCard(s){
  const{present,total}=calcAtt(s);
  const absent=total-present;
  const pct=total>0?Math.round(present/total*100):0;
  const col=pctColor(pct);
  const chips=Object.keys(s.sessions).map(d=>{
    const ok=s.sessions[d];
    return '<span class="date-chip '+(ok?'present':'absent')+'">'+d+' '+(ok?'✓':'✗')+'</span>';
  }).join('');
  return '<div class="result-card">'+
    '<div class="student-header">'+
      '<div class="avatar">'+initials(s.name)+'</div>'+
      '<div>'+
        '<span class="course-tag">'+s.sheet+'</span>'+
        '<div class="student-name">'+s.name+'</div>'+
        '<div class="student-meta">'+s.area+' · Roll no. '+s.sno+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="stats-grid">'+
      '<div class="stat-card"><div class="stat-label">Days attended</div><div class="stat-val" style="color:'+col+'">'+present+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">Days absent</div><div class="stat-val">'+absent+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">Attendance %</div><div class="stat-val" style="color:'+col+'">'+pct+'%</div></div>'+
    '</div>'+
    '<div class="pct-bar-wrap"><div class="pct-bar" style="width:'+pct+'%;background:'+col+';"></div></div>'+
    '<div class="req-row">'+
      '<span>'+(pct>=75?'✓ Attendance requirement met':'⚠ Below 75% requirement')+'</span>'+
      '<span>'+present+' of '+total+' class days</span>'+
    '</div>'+
    '<div class="dates-section">'+
      '<div class="dates-label">Day-by-day record (oldest first)</div>'+
      '<div class="dates-grid">'+chips+'</div>'+
    '</div>'+
  '</div>';
}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('suggestList').style.display='none';
  if(!q){document.getElementById('resultArea').innerHTML='';return;}
  const matches=STUDENTS.filter(s=>s.name.toLowerCase().includes(q));
  document.getElementById('resultArea').innerHTML=matches.length
    ?matches.map(renderCard).join('')
    :'<div class="no-result">No student found. Try a partial name.</div>';
}

function onInput(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const list=document.getElementById('suggestList');
  if(!q){list.style.display='none';return;}
  const m=STUDENTS.filter(s=>s.name.toLowerCase().includes(q)).slice(0,6);
  if(!m.length){list.style.display='none';return;}
  list.innerHTML=m.map(s=>'<div class="suggest-item" onclick="sel(\''+s.name+'\')">'+s.name+' <span style="color:#aaa;font-size:12px;">· '+s.area+'</span></div>').join('');
  list.style.display='block';
}

function sel(name){
  document.getElementById('searchInput').value=name;
  document.getElementById('suggestList').style.display='none';
  doSearch();
}

function onKey(e){
  if(e.key==='Enter')doSearch();
  if(e.key==='Escape')document.getElementById('suggestList').style.display='none';
}

document.addEventListener('click',function(e){
  if(!e.target.closest('.search-wrap'))document.getElementById('suggestList').style.display='none';
});
</script>
</body>
</html>
