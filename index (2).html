<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a18; padding: 2rem 1rem; }
  .container { max-width: 700px; margin: 0 auto; }
  h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .search-box { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .search-wrap { position: relative; flex: 1; }
  input[type=text] { width: 100%; padding: 8px 12px; font-size: 15px; border: 1px solid #ccc; border-radius: 8px; outline: none; background: #fff; }
  input[type=text]:focus { border-color: #888; }
  button { padding: 8px 18px; font-size: 14px; border: 1px solid #aaa; border-radius: 8px; background: #fff; cursor: pointer; white-space: nowrap; }
  button:hover { background: #f0f0ee; }
  .suggest-list { position: absolute; background: #fff; border: 1px solid #ccc; border-radius: 8px; width: 100%; max-height: 200px; overflow-y: auto; z-index: 10; top: calc(100% + 4px); }
  .suggest-item { padding: 8px 12px; font-size: 14px; cursor: pointer; }
  .suggest-item:hover { background: #f5f5f3; }
  .result-card { background: #fff; border: 1px solid #e0e0dc; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .student-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: #e6f1fb; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 13px; color: #185fa5; flex-shrink: 0; }
  .course-tag { display: inline-block; font-size: 11px; padding: 2px 8px; background: #f0f0ee; border-radius: 10px; color: #666; margin-bottom: 4px; }
  .student-name { font-size: 16px; font-weight: 500; }
  .student-meta { font-size: 13px; color: #666; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
  .stat-card { background: #f5f5f3; border-radius: 8px; padding: 0.75rem; text-align: center; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 500; }
  .pct-bar-wrap { height: 6px; background: #e8e8e4; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .pct-bar { height: 100%; border-radius: 3px; }
  .req-row { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin: 4px 0 12px; }
  .dates-section { border-top: 1px solid #e8e8e4; padding-top: 0.75rem; }
  .dates-label { font-size: 12px; color: #888; margin-bottom: 8px; }
  .dates-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .date-chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; }
  .present { background: #eaf3de; color: #3b6d11; }
  .absent { background: #fcebeb; color: #a32d2d; }
  .no-result { text-align: center; color: #888; padding: 2rem; font-size: 14px; }
</style>

const CLASS_DATES = ["21 Jan","28 Jan","16 Feb","11 Mar","4 Jan","4 Jun"];
const TOTAL_SESSIONS = CLASS_DATES.length;

function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function pctColor(p) {
  if (p >= 75) return '#3B6D11';
  if (p >= 50) return '#BA7517';
  return '#A32D2D';
}
function calcAttendance(s) {
  return CLASS_DATES.filter(d => s.sessions[d]).length;
}

function renderCard(s) {
  const present = calcAttendance(s);
  const absent = TOTAL_SESSIONS - present;
  const pct = Math.round((present / TOTAL_SESSIONS) * 100);
  const barColor = pctColor(pct);
  const chips = CLASS_DATES.map(d => {
    const attended = s.sessions[d];
    return `<span class="date-chip ${attended ? 'present' : 'absent'}">${d} ${attended ? '✓' : '✗'}</span>`;
  }).join('');
  return `
    <div class="result-card">
      <div class="student-header">
        <div class="avatar">${initials(s.name)}</div>
        <div>
          <span class="course-tag">Research Methodology · RM</span>
          <div class="student-name">${s.name}</div>
          <div class="student-meta">${s.area} · Roll no. ${s.sno}</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Classes attended</div><div class="stat-val" style="color:${barColor}">${present}</div></div>
        <div class="stat-card"><div class="stat-label">Absent</div><div class="stat-val">${absent}</div></div>
        <div class="stat-card"><div class="stat-label">Attendance %</div><div class="stat-val" style="color:${barColor}">${pct}%</div></div>
      </div>
      <div class="pct-bar-wrap"><div class="pct-bar" style="width:${pct}%;background:${barColor};"></div></div>
      <div class="req-row">
        <span>${pct >= 75 ? '✓ Attendance requirement met' : '⚠ Below 75% requirement'}</span>
        <span>${pct}% of ${TOTAL_SESSIONS} classes</span>
      </div>
      <div class="dates-section">
        <div class="dates-label">Session-by-session record</div>
        <div class="dates-grid">${chips}</div>
      </div>
    </div>`;
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('suggestList').style.display = 'none';
  if (!q) { document.getElementById('resultArea').innerHTML = ''; return; }
  const matches = STUDENTS.filter(s => s.name.toLowerCase().includes(q));
  document.getElementById('resultArea').innerHTML = matches.length
    ? matches.map(renderCard).join('')
    : '<div class="no-result">No student found. Please check your spelling or try a partial name.</div>';
}

function onInput() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = document.getElementById('suggestList');
  if (!q) { list.style.display='none'; return; }
  const matches = STUDENTS.filter(s => s.name.toLowerCase().includes(q)).slice(0,6);
  if (!matches.length) { list.style.display='none'; return; }
  list.innerHTML = matches.map(s =>
    `<div class="suggest-item" onclick="selectSuggest('${s.name}')">${s.name} <span style="color:#aaa;font-size:12px;">· ${s.area}</span></div>`
  ).join('');
  list.style.display = 'block';
}

function selectSuggest(name) {
  document.getElementById('searchInput').value = name;
  document.getElementById('suggestList').style.display = 'none';
  doSearch();
}

function onKey(e) {
  if (e.key === 'Enter') doSearch();
  if (e.key === 'Escape') document.getElementById('suggestList').style.display='none';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) document.getElementById('suggestList').style.display = 'none';
});
</script>
